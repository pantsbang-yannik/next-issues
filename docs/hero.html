<!DOCTYPE html><html><head><meta charset="utf-8"><style>
  *{margin:0;box-sizing:border-box}
  html,body{width:1680px;height:720px;overflow:hidden}
  .hero{position:relative;width:1680px;height:720px;overflow:hidden;
    font-family:"SF Pro Display","Helvetica Neue","Segoe UI",Arial,sans-serif;
    background:#f4561a;
    background-image:
      radial-gradient(130% 115% at 50% -18%, #ffc489 0%, #ff944d 30%, #f5601f 60%, #e84e12 100%);}
  /* faint vertical light streaks */
  .streaks{position:absolute;inset:0;opacity:.5;
    background-image:repeating-linear-gradient(90deg, rgba(255,255,255,.06) 0 1px, transparent 1px 64px);
    -webkit-mask-image:linear-gradient(180deg,transparent,#000 18%,#000 82%,transparent);}
  /* soft top glow */
  .glow{position:absolute;left:50%;top:-340px;transform:translateX(-50%);width:1200px;height:760px;
    background:radial-gradient(closest-side, rgba(255,255,255,.5), rgba(255,255,255,0));filter:blur(10px)}

  .pill{position:absolute;left:50%;top:96px;transform:translateX(-50%);display:flex;align-items:center;gap:10px;
    background:rgba(255,255,255,.92);border-radius:999px;padding:9px 18px 9px 12px;
    box-shadow:0 16px 34px -12px rgba(120,40,0,.45);color:#7a3a18;font-weight:600;font-size:18px;letter-spacing:.01em}
  .pill .mk{width:26px;height:26px;border-radius:8px;background:linear-gradient(135deg,#ff8a3d,#ef5a18);
    display:grid;place-items:center;color:#fff;font-size:15px;box-shadow:inset 0 -2px 4px rgba(0,0,0,.18)}

  .center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .title{font-weight:800;font-size:188px;line-height:.98;letter-spacing:-2px;color:#fff;
    text-shadow:0 8px 30px rgba(150,50,0,.28);}
  .title .dim{color:rgba(255,255,255,.52)}
  .sub{margin-top:26px;font-size:30px;font-weight:500;color:rgba(255,255,255,.92);letter-spacing:.01em}
  .sub b{font-weight:700;color:#fff}

  /* peeking issue-node cards */
  .card{position:absolute;width:300px;background:#fffdfb;border-radius:20px;padding:20px 22px;
    box-shadow:0 40px 80px -26px rgba(120,40,0,.5), 0 8px 20px -10px rgba(120,40,0,.3)}
  .card::before{content:"";position:absolute;left:0;top:20px;bottom:20px;width:4px;border-radius:4px;background:var(--c)}
  .card .k{font-size:13px;letter-spacing:.14em;text-transform:uppercase;color:#a3a8b2;display:flex;justify-content:space-between;align-items:center}
  .card .k .dot{width:9px;height:9px;border-radius:50%;background:var(--c)}
  .card .n{font-family:"SF Mono",ui-monospace,Menlo,monospace;font-weight:800;font-size:30px;color:#23262b;margin-top:10px}
  .card .t{font-size:16px;color:#5b616c;margin-top:5px;line-height:1.35}
  .card .chips{display:flex;gap:7px;margin-top:14px}
  .card .chip{font-size:12px;color:#5b616c;background:#f2f3f5;border:1px solid #e9eaee;border-radius:6px;padding:2px 9px}
  .card .nub{position:absolute;width:14px;height:14px;border-radius:50%;background:#fff;border:2px solid #cdd2da;top:calc(50% - 7px)}
  .cTL{left:-46px;top:-30px;transform:rotate(-7deg);--c:#5aa17a}
  .cTL .nub{right:-7px}
  .cTR{right:-44px;top:-40px;transform:rotate(7deg);--c:#c4655a}
  .cTR .nub{left:-7px}

  /* glossy connection nubs */
  .puck{position:absolute;border-radius:50%}
  .puck::after{content:"";position:absolute;left:24%;top:16%;width:42%;height:34%;border-radius:50%;
    background:radial-gradient(closest-side, rgba(255,255,255,.9), rgba(255,255,255,0));filter:blur(1px)}
  .pBlue{left:54px;bottom:-40px;width:118px;height:118px;
    background:radial-gradient(circle at 38% 30%, #aecaf7, #4f82e0 56%, #2f5dbe);
    box-shadow:0 26px 50px -10px rgba(20,40,90,.55), inset 0 -8px 16px rgba(10,30,80,.35), inset 0 6px 12px rgba(255,255,255,.4)}
  .pAmber{right:96px;bottom:34px;width:80px;height:80px;
    background:radial-gradient(circle at 38% 30%, #ffe1b0, #ffae5c 55%, #f07d2a);
    box-shadow:0 22px 44px -10px rgba(140,60,0,.5), inset 0 -7px 14px rgba(120,50,0,.3), inset 0 5px 10px rgba(255,255,255,.6)}

  /* faint dependency cable */
  svg.cable{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}
</style></head>
<body>
  <div class="hero">
    <div class="streaks"></div>
    <div class="glow"></div>
    <svg class="cable" viewBox="0 0 1680 720" preserveAspectRatio="none">
      <path d="M250,150 C360,250 360,300 470,360" fill="none" stroke="rgba(255,255,255,.34)" stroke-width="2.5" stroke-dasharray="2 9" stroke-linecap="round"/>
      <path d="M1430,150 C1320,250 1320,300 1210,360" fill="none" stroke="rgba(255,255,255,.34)" stroke-width="2.5" stroke-dasharray="2 9" stroke-linecap="round"/>
    </svg>

    <div class="pill"><span class="mk">◆</span>A Claude Code skill</div>

    <div class="center">
      <div class="title">NEXT<span class="dim">-ISSUES</span></div>
      <div class="sub">Map your backlog — <b>see what each issue chain ships next.</b></div>
    </div>

    <div class="card cTL">
      <div class="k"><span>Checkout</span><span class="dot"></span></div>
      <div class="n">#202</div><div class="t">Refactor cart into a stateless service</div>
      <div class="chips"><span class="chip">ready</span><span class="chip">unlocks #204</span></div>
      <span class="nub"></span>
    </div>
    <div class="card cTR">
      <div class="k"><span>Checkout</span><span class="dot"></span></div>
      <div class="n">#204</div><div class="t">Rebuild checkout as one-page flow</div>
      <div class="chips"><span class="chip">blocked by #202</span></div>
      <span class="nub"></span>
    </div>

    <div class="puck pBlue"></div>
    <div class="puck pAmber"></div>
  </div>
</body></html>
